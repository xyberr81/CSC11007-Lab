name: Developer Build CD

on:
  workflow_dispatch:
    inputs:
      cart:
        description: "Branch to deploy for cart"
        default: "main"
        required: true
      customer:
        description: "Branch to deploy for customer"
        default: "main"
        required: true
      inventory:
        description: "Branch to deploy for inventory"
        default: "main"
        required: true
      location:
        description: "Branch to deploy for location"
        default: "main"
        required: true
      media:
        description: "Branch to deploy for media"
        default: "main"
        required: true
      order:
        description: "Branch to deploy for order"
        default: "main"
        required: true
      payment:
        description: "Branch to deploy for payment"
        default: "main"
        required: true
      payment-paypal:
        description: "Branch to deploy for payment-paypal"
        default: "main"
        required: true
      product:
        description: "Branch to deploy for product"
        default: "main"
        required: true
      promotion:
        description: "Branch to deploy for promotion"
        default: "main"
        required: true
      rating:
        description: "Branch to deploy for rating"
        default: "main"
        required: true
      recommendation:
        description: "Branch to deploy for recommendation"
        default: "main"
        required: true
      search:
        description: "Branch to deploy for search"
        default: "main"
        required: true
      tax:
        description: "Branch to deploy for tax"
        default: "main"
        required: true
      webhook:
        description: "Branch to deploy for webhook"
        default: "main"
        required: true
      storefront-bff:
        description: "Branch to deploy for storefront-bff"
        default: "main"
        required: true
      backoffice-bff:
        description: "Branch to deploy for backoffice-bff"
        default: "main"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Kubernetes access
        uses: azure/k8s-set-context@v3
        continue-on-error: true 
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Deploy Services with Helm
        run: |
          set +e
          echo "Bắt đầu tiến trình CD tự động..."
          
          # Đọc trực tiếp từ github actions context
          declare -A branches
          branches[cart]="${{ github.event.inputs.cart || 'main' }}"
          branches[customer]="${{ github.event.inputs.customer || 'main' }}"
          branches[inventory]="${{ github.event.inputs.inventory || 'main' }}"
          branches[location]="${{ github.event.inputs.location || 'main' }}"
          branches[media]="${{ github.event.inputs.media || 'main' }}"
          branches[order]="${{ github.event.inputs.order || 'main' }}"
          branches[payment]="${{ github.event.inputs.payment || 'main' }}"
          branches[payment-paypal]="${{ github.event.inputs.payment-paypal || 'main' }}"
          branches[product]="${{ github.event.inputs.product || 'main' }}"
          branches[promotion]="${{ github.event.inputs.promotion || 'main' }}"
          branches[rating]="${{ github.event.inputs.rating || 'main' }}"
          branches[recommendation]="${{ github.event.inputs.recommendation || 'main' }}"
          branches[search]="${{ github.event.inputs.search || 'main' }}"
          branches[tax]="${{ github.event.inputs.tax || 'main' }}"
          branches[webhook]="${{ github.event.inputs.webhook || 'main' }}"
          branches[storefront-bff]="${{ github.event.inputs.storefront-bff || 'main' }}"
          branches[backoffice-bff]="${{ github.event.inputs.backoffice-bff || 'main' }}"
          
          for service in "${!branches[@]}"; do
            branch="${branches[$service]}"
            
            # Đảm bảo branch luôn có giá trị
            if [ -z "$branch" ]; then
              branch="main"
            fi
            
            echo "---------------------------------------------------"
            echo "Đang xử lý deploy cho service: $service (Branch: $branch)"
            
            if [ "$branch" == "main" ] || [ "$branch" == "latest" ]; then
              TAG="main"
              echo "Sử dụng tag mặc định: $TAG"
            else
              echo "Fetching branch $branch từ remote..."
              git fetch origin $branch:$branch || true
              TAG=$(git rev-parse --short origin/$branch 2>/dev/null || git rev-parse --short HEAD || echo "main")
              echo "Đã phân giải tag cho branch $branch là: $TAG"
            fi
            
            IMAGE_REPO="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/yas-$service"
            
            echo "Cập nhật dependency cho Helm Chart $service..."
            helm dependency update ./k8s/charts/$service || echo "Không có dependency hoặc lỗi tải dependency"
            
            echo "Thực thi lệnh Helm upgrade cho $service..."
            helm upgrade --install $service ./k8s/charts/$service \
              --namespace yas-dev \
              --set backend.image.repository="$IMAGE_REPO" \
              --set backend.image.tag="$TAG" || echo "[CẢNH BÁO] Deploy $service thất bại (Bỏ qua)"
              
          done
          echo "---------------------------------------------------"
          echo "Hoàn tất kịch bản CD!"
          exit 0
