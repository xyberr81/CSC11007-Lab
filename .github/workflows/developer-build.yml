name: Developer Build CD

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      backoffice:
        description: "Branch to deploy for backoffice UI"
        default: "main"
        required: true
      backoffice-bff:
        description: "Branch to deploy for backoffice-bff"
        default: "main"
        required: true
      cart:
        description: "Branch to deploy for cart"
        default: "main"
        required: true
      customer:
        description: "Branch to deploy for customer"
        default: "main"
        required: true
      inventory:
        description: "Branch to deploy for inventory"
        default: "main"
        required: true
      media:
        description: "Branch to deploy for media"
        default: "main"
        required: true
      order:
        description: "Branch to deploy for order"
        default: "main"
        required: true
      product:
        description: "Branch to deploy for product"
        default: "main"
        required: true
      sampledata:
        description: "Branch to deploy for sampledata"
        default: "main"
        required: true
      search:
        description: "Branch to deploy for search"
        default: "main"
        required: true
      storefront:
        description: "Branch to deploy for storefront UI"
        default: "main"
        required: true
      storefront-bff:
        description: "Branch to deploy for storefront-bff"
        default: "main"
        required: true
      tax:
        description: "Branch to deploy for tax"
        default: "main"
        required: true

jobs:
  developer-build:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Prepare helper scripts
        shell: bash
        run: chmod +x scripts/resolve_branch_tag.sh scripts/check_dockerhub_image.sh scripts/update_gitops_values.sh

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve tags, verify images, and update GitOps manifests
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          BRANCH_BACKOFFICE: ${{ github.event.inputs.backoffice }}
          BRANCH_BACKOFFICE_BFF: ${{ github.event.inputs['backoffice-bff'] }}
          BRANCH_CART: ${{ github.event.inputs.cart }}
          BRANCH_CUSTOMER: ${{ github.event.inputs.customer }}
          BRANCH_INVENTORY: ${{ github.event.inputs.inventory }}
          BRANCH_MEDIA: ${{ github.event.inputs.media }}
          BRANCH_ORDER: ${{ github.event.inputs.order }}
          BRANCH_PRODUCT: ${{ github.event.inputs.product }}
          BRANCH_SAMPLEDATA: ${{ github.event.inputs.sampledata }}
          BRANCH_SEARCH: ${{ github.event.inputs.search }}
          BRANCH_STOREFRONT: ${{ github.event.inputs.storefront }}
          BRANCH_STOREFRONT_BFF: ${{ github.event.inputs['storefront-bff'] }}
          BRANCH_TAX: ${{ github.event.inputs.tax }}
        run: |
          set -euo pipefail

          trap 'echo "::error::Developer build failed near line ${LINENO}. Check the service logs above for the exact branch/image/manifest being processed."' ERR

          if [[ -z "${DOCKERHUB_USERNAME}" ]]; then
            echo "::error::DOCKERHUB_USERNAME secret is empty or missing."
            exit 1
          fi

          declare -A branches=(
            [backoffice]="${BRANCH_BACKOFFICE}"
            [backoffice-bff]="${BRANCH_BACKOFFICE_BFF}"
            [cart]="${BRANCH_CART}"
            [customer]="${BRANCH_CUSTOMER}"
            [inventory]="${BRANCH_INVENTORY}"
            [media]="${BRANCH_MEDIA}"
            [order]="${BRANCH_ORDER}"
            [product]="${BRANCH_PRODUCT}"
            [sampledata]="${BRANCH_SAMPLEDATA}"
            [search]="${BRANCH_SEARCH}"
            [storefront]="${BRANCH_STOREFRONT}"
            [storefront-bff]="${BRANCH_STOREFRONT_BFF}"
            [tax]="${BRANCH_TAX}"
          )

          services=(
            backoffice
            backoffice-bff
            cart
            customer
            inventory
            media
            order
            product
            sampledata
            search
            storefront
            storefront-bff
            tax
          )

          {
            echo "## Developer Build Summary"
            echo
            echo "| Service | Branch | Deploy Tag | Manifest |"
            echo "| --- | --- | --- | --- |"
          } >> "${GITHUB_STEP_SUMMARY}"

          for service in "${services[@]}"; do
            branch="${branches[$service]}"
            echo "Resolving deploy tag for service=${service} branch=${branch}"
            deploy_tag="$(./scripts/resolve_branch_tag.sh "$branch")"

            case "$service" in
              storefront)
                image_name="yas-storefront"
                manifest_name="storefront-ui.yaml"
                ;;
              backoffice)
                image_name="yas-backoffice"
                manifest_name="backoffice-ui.yaml"
                ;;
              *)
                image_name="yas-${service}"
                manifest_name="${service}.yaml"
                ;;
            esac

            image_repository="docker.io/${DOCKERHUB_USERNAME}/${image_name}"
            echo "Verifying image=${image_repository}:${deploy_tag}"
            ./scripts/check_dockerhub_image.sh "${image_repository}" "${deploy_tag}"
            echo "Updating manifest for service=${service}"
            ./scripts/update_gitops_values.sh "${service}" "${DOCKERHUB_USERNAME}" "${deploy_tag}"

            echo "| ${service} | ${branch} | ${deploy_tag} | ${manifest_name} |" >> "${GITHUB_STEP_SUMMARY}"
          done

      - name: Commit and push GitOps updates
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- k8s/deploy/dev/services; then
            echo "No GitOps changes were required."
            exit 0
          fi

          git config user.name "yas-gitops-bot"
          git config user.email "yas-gitops-bot@users.noreply.github.com"
          git add k8s/deploy/dev/services
          git commit -m "chore(gitops): update dev image tags [skip gitops ci]"
          git push origin HEAD:main
