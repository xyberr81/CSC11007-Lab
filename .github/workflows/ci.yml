name: YAS Monorepo CI

permissions:
  contents: read
  actions: write
  checks: write
  pull-requests: read

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Detect which services changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      changed-services: ${{ steps.changes.outputs.changed-services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Detect changed services
        id: changes
        run: |
          # List all services in monorepo
          SERVICES=("product" "cart" "customer" "order" "inventory" "payment" "payment-paypal" "rating" "search" "media" "location" "tax" "promotion" "webhook" "sampledata" "recommendation" "delivery")
          
          # Get changed files
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Find which services changed
          CHANGED_SERVICES=""
          for service in "${SERVICES[@]}"; do
            if echo "$CHANGED_FILES" | grep -q "^$service/"; then
              CHANGED_SERVICES="$CHANGED_SERVICES $service"
            fi
          done
          
          # If pom.xml changed, build all services
          if echo "$CHANGED_FILES" | grep -q "^pom.xml"; then
            CHANGED_SERVICES="${SERVICES[*]}"
          fi
          
          # Convert to JSON array for matrix strategy (compact format for GITHUB_OUTPUT)
          if [ -n "$CHANGED_SERVICES" ]; then
            JSON_SERVICES=$(echo $CHANGED_SERVICES | tr ' ' '\n' | jq -R . | jq -s -c .)
          else
            JSON_SERVICES="[]"
          fi

          echo "Changed services: $CHANGED_SERVICES"
          echo "JSON: $JSON_SERVICES"

          # Use proper delimiter for multi-line outputs
          echo "services<<EOF" >> $GITHUB_OUTPUT
          echo "$JSON_SERVICES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "changed-services=$CHANGED_SERVICES" >> $GITHUB_OUTPUT

  # Job 2: Test Phase - Run unit tests for changed services
  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.changed-services != '' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run Tests for ${{ matrix.service }}
        run: mvn clean test -pl ${{ matrix.service }} -am
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/target/surefire-reports/*.xml
            ${{ matrix.service }}/target/failsafe-reports/*.xml
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/target/site/jacoco/

  # Job 3: Build Phase - Build and package applications
  build:
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: ${{ needs.detect-changes.outputs.changed-services != '' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build Application
        run: mvn clean package -DskipTests -pl ${{ matrix.service }} -am
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.service }}
          path: ${{ matrix.service }}/target/*.jar

# Job 4: Security Phase - Run Gitleaks, SonarQube and Snyk scans
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks scan
        run: |
          docker pull zricethezav/gitleaks:v8.18.4
          docker run --rm -v ${{ github.workspace }}:/work -w /work \
            zricethezav/gitleaks:v8.18.4 detect --source="." \
            --config="/work/gitleaks.toml" --verbose \
            --report-format=json --report-path=/work/gitleaks-baseline.json || true
          docker run --rm -v ${{ github.workspace }}:/work -w /work \
            zricethezav/gitleaks:v8.18.4 detect --source="." \
            --config="/work/gitleaks.toml" --verbose \
            --baseline-path=/work/gitleaks-baseline.json

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run SonarQube analysis
        if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B clean verify -DskipTests sonar:sonar -Dsonar.token="$SONAR_TOKEN" -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.projectKey=Devops-cicd-lab


      - name: Set up Snyk CLI
        if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
        uses: snyk/actions/setup@master

      - name: Run Snyk test
        if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-projects --severity-threshold=high

      - name: Run Snyk monitor
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk monitor --all-projects


  # Final Job: The one you will select in GitHub Branch Protection settings
  ci-success:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always() # This must run even if some matrix jobs were skipped
    steps:
      - name: Check Status
        run: |
          # ci-success logic:
          # 1. If both test and build are skipped → pass (no changes detected)
          # 2. If both test and build succeeded → pass (changes detected and passed)
          # 3. Otherwise → fail
          echo "Test result: ${{ needs.test.result }}"
          echo "Build result: ${{ needs.build.result }}"
          
          if [[ "${{ needs.test.result }}" == "skipped" && "${{ needs.build.result }}" == "skipped" ]]; then
            echo "No changes detected, CI passed!"
            exit 0
          fi
          
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.build.result }}" == "success" ]]; then
            echo "All checks passed, CI passed!"
            exit 0
          fi
          
          echo "CI failed or was not successful!"
          exit 1
