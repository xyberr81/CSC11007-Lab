name: CI Build and Push Docker Hub

on:
  push:
    branches:
      - '**'          # Chạy trên mọi branch
      - '!staging'    # Ngoại trừ staging

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Cần fetch để có thể so sánh git diff

      - name: Setup Java 25
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Get Short Commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Detect Changed Services and Build
        run: |
          echo "Bắt đầu kiểm tra các file thay đổi..."
          # Lấy danh sách file thay đổi so với commit trước
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD || git diff --name-only HEAD)
          echo "Danh sách file thay đổi:"
          echo "$CHANGED_FILES"
          
          # Trích xuất tên các thư mục gốc bị thay đổi (cắt lấy phần trước dấu / đầu tiên)
          SERVICES=$(echo "$CHANGED_FILES" | cut -d'/' -f1 | sort -u)
          
          for service in $SERVICES; do
            # Chỉ build nếu thư mục đó là một service có chứa file Dockerfile
            if [ -f "$service/Dockerfile" ]; then
              echo "---------------------------------------------------"
              echo "Phát hiện thay đổi ở service: $service. Bắt đầu build..."
              echo "---------------------------------------------------"
              
              # 1. Build bằng Maven (chạy từ thư mục gốc, dùng Maven của GitHub Actions)
              mvn clean package -pl $service -am -DskipTests
              
              # 2. Khai báo tên thẻ (tag) cho Image
              IMAGE_TAG="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/yas-$service:${{ steps.vars.outputs.sha_short }}"
              
              # 3. Build Docker Image
              echo "Building Docker image: $IMAGE_TAG"
              docker build -t $IMAGE_TAG ./$service
              
              # 4. Push lên Docker Hub
              echo "Pushing Docker image..."
              docker push $IMAGE_TAG
            else
              echo "Bỏ qua thư mục $service vì không có Dockerfile (không phải service)."
            fi
          done
