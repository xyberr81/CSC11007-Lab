apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging-sampledata
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  sources:
    - repoURL: "https://github.com/xyberr81/CSC11007-Lab.git"
      targetRevision: main
      path: k8s/charts/sampledata
      helm:
        valueFiles:
          - values.yaml
          - $values/k8s/deploy/staging/values-staging-override.yaml
          - $values/k8s/deploy/staging/services/sampledata.yaml
    - repoURL: "https://github.com/xyberr81/CSC11007-Lab.git"
      targetRevision: main
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: yas-staging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
