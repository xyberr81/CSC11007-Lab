apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging-grafana-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: "https://github.com/xyberr81/CSC11007-Lab.git"
    targetRevision: main
    path: k8s/deploy/observability/grafana
    helm:
      valueFiles:
        - values.yaml
      values: |
        grafana:
          externalUrl: http://yas-staging-prometheus-grafana
          datasources:
            lokiUrl: http://yas-staging-loki-gateway
            tempoUrl: http://yas-staging-tempo:3100
  destination:
    server: "https://kubernetes.default.svc"
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
