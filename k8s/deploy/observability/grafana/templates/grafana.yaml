apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: "grafana"
spec:
  external:
    url: {{ .Values.grafana.externalUrl }}
    adminPassword:
      name: grafana-admin-credentials
      key: password
    adminUser:
      name: grafana-admin-credentials
      key: username
