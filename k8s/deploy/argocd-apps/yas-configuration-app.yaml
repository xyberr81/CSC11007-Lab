apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-configuration
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/xyberr81/CSC11007-Lab.git"
    targetRevision: HEAD
    path: k8s/charts/yas-configuration
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: "https://kubernetes.default.svc"
    namespace: yas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
