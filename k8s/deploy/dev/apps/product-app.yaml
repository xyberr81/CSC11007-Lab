apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-product
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: "https://github.com/xyberr81/CSC11007-Lab.git"
      targetRevision: feat/add-argocd-apps
      path: k8s/charts/product
      helm:
        valueFiles:
          - values.yaml
          - $values/k8s/deploy/dev/values-dev-override.yaml
        parameters:
          - name: backend.image.repository
            value: ghcr.io/nashtech-garage/yas-product
    - repoURL: "https://github.com/xyberr81/CSC11007-Lab.git"
      targetRevision: feat/add-argocd-apps
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
