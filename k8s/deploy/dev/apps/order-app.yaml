apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-order
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  sources:
    - repoURL: "https://github.com/xyberr81/CSC11007-Lab.git"
      targetRevision: main
      path: k8s/charts/order
      helm:
        valueFiles:
          - values.yaml
          - $values/k8s/deploy/dev/values-dev-override.yaml
          - $values/k8s/deploy/dev/services/order.yaml
    - repoURL: "https://github.com/xyberr81/CSC11007-Lab.git"
      targetRevision: main
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: yas-dev
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
