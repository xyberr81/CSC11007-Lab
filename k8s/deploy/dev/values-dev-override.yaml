backend:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.azure.com/agentpool
                operator: In
                values:
                  - nodepool1
  ingress:
    host: api.dev.yas.local.com
ui:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.azure.com/agentpool
                operator: In
                values:
                  - nodepool1
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: kubernetes.azure.com/agentpool
              operator: In
              values:
                - nodepool1
applicationConfig:
  springdoc:
    oauthflow:
      authorization-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/auth
      token-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/token
mediaApplicationConfig:
  yas:
    publicUrl: http://api.dev.yas.local.com/media
paymentPaypalApplicationConfig:
  yas:
    public:
      url: http://storefront.dev.yas.local.com/complete-payment
