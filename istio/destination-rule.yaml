# ── PAYMENT: Yêu cầu timeout dài hơn (external payment gateway) ───────────
#    Không eject quá nhanh vì payment thường chậm hơn (tích hợp bên ngoài)
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: payment
  namespace: yas-dev
spec:
  host: payment.yas-dev.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    loadBalancer:
      simple: LEAST_REQUEST
    connectionPool:
      http:
        http1MaxPendingRequests: 50    # Payment ít request hơn nhưng latency cao hơn
        http2MaxRequests: 500
        maxRequestsPerConnection: 5
        idleTimeout: 90s               # Giữ connection lâu hơn (payment cần thời gian)
      tcp:
        maxConnections: 50
        connectTimeout: 5s             # Timeout kết nối lâu hơn cho payment gateway
    outlierDetection:
      consecutive5xxErrors: 5          # Không eject quá nhanh
      interval: 60s                    # Kiểm tra thưa hơn (60s) vì latency cao
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
---
