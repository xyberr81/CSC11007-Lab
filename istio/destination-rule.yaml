# ── DEFAULT: Baseline cho toàn bộ services trong namespace ────────────────
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: default
  namespace: yas-dev
spec:
  host: "*.yas-dev.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL               # Client dùng cert do Istio quản lý
    loadBalancer:
      simple: LEAST_REQUEST            # Gửi tới server ít request nhất
    connectionPool:
      http:
        http1MaxPendingRequests: 100   # Hàng chờ HTTP/1.1 tối đa
        http2MaxRequests: 1000         # Tổng concurrent HTTP/2 requests
        maxRequestsPerConnection: 10   # Buộc reconnect sau 10 req (tránh hot connection)
        idleTimeout: 60s               # Đóng connection idle sau 60 giây
      tcp:
        maxConnections: 100            # Tổng TCP connections tối đa
        connectTimeout: 3s             # Timeout kết nối TCP
    outlierDetection:                  # Circuit breaker – eject pod lỗi
      consecutive5xxErrors: 5          # Eject sau 5 lỗi 5xx liên tiếp
      interval: 30s                    # Kiểm tra mỗi 30 giây
      baseEjectionTime: 30s            # Thời gian eject tối thiểu
      maxEjectionPercent: 50           # Eject tối đa 50% số pod (giữ 1 pod luôn phục vụ)
      minHealthPercent: 50             # Bật circuit breaker khi ≥50% pod còn healthy
---
# ── STOREFRONT-BFF: Gateway vào hệ thống phía khách hàng ─────────────────
#    Traffic cao (user-facing), cần connection pool rộng hơn default
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: storefront-bff
  namespace: yas-dev
spec:
  host: storefront-bff.yas-dev.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    loadBalancer:
      simple: LEAST_REQUEST
    connectionPool:
      http:
        http1MaxPendingRequests: 200   # BFF chịu nhiều traffic hơn backend service
        http2MaxRequests: 2000
        maxRequestsPerConnection: 10
        idleTimeout: 60s
      tcp:
        maxConnections: 200
        connectTimeout: 3s
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
---
# ── BACKOFFICE-BFF: Gateway cho admin/backoffice ──────────────────────────
#    Traffic thấp hơn storefront nhưng vẫn cần circuit breaker
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: backoffice-bff
  namespace: yas-dev
spec:
  host: backoffice-bff.yas-dev.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    loadBalancer:
      simple: LEAST_REQUEST
    connectionPool:
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10
        idleTimeout: 60s
      tcp:
        maxConnections: 100
        connectTimeout: 3s
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
---
# ── ORDER: Critical path – xử lý đơn hàng, cần circuit breaker chặt ──────
#    Lỗi ở đây ảnh hưởng trực tiếp doanh thu → eject nhanh hơn
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: order
  namespace: yas-dev
spec:
  host: order.yas-dev.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    loadBalancer:
      simple: LEAST_REQUEST
    connectionPool:
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10
        idleTimeout: 60s
      tcp:
        maxConnections: 100
        connectTimeout: 3s
    outlierDetection:
      consecutive5xxErrors: 3          # Chặt hơn: eject sau chỉ 3 lỗi
      consecutiveGatewayErrors: 3      # Cũng eject khi gặp gateway error
      interval: 10s                    # Kiểm tra thường xuyên hơn (10s)
      baseEjectionTime: 60s            # Eject lâu hơn (60s) để service tự hồi phục
      maxEjectionPercent: 50
      minHealthPercent: 50
---
# ── CART: Liên quan chặt với order, cần circuit breaker tương tự ──────────
apiVersion: networking.istio.io/v1alpha3
