# ── MEDIA: Upload/download file, connection pool rộng hơn ────────────────
#    Request lâu hơn do truyền file, cần idleTimeout cao hơn
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: media
  namespace: yas-dev
spec:
  host: media.yas-dev.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    loadBalancer:
      simple: LEAST_REQUEST
    connectionPool:
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 500
        maxRequestsPerConnection: 5
        idleTimeout: 120s              # File upload/download cần giữ connection lâu
      tcp:
        maxConnections: 100
        connectTimeout: 5s
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
---
# ── SEARCH: Read-heavy, latency thấp quan trọng ──────────────────────────
#    Elasticsearch-backed → circuit breaker chặt để fail fast
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: search
  namespace: yas-dev
spec:
  host: search.yas-dev.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    loadBalancer:
      simple: LEAST_REQUEST
    connectionPool:
      http:
        http1MaxPendingRequests: 200
        http2MaxRequests: 2000
        maxRequestsPerConnection: 10
        idleTimeout: 60s
      tcp:
        maxConnections: 200
        connectTimeout: 3s
    outlierDetection:
      consecutive5xxErrors: 3          # Fail fast khi ES có vấn đề
      consecutiveGatewayErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
