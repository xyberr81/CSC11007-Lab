apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: order-retry
  namespace: yas-staging
spec:
  hosts:
  - order
  http:
  - route:
    - destination:
        host: order
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: "401,5xx,connect-failure,refused-stream,retriable-4xx"
---
