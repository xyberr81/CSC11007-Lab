    - source:
        principals:
        - "cluster.local/ns/yas-dev/sa/backoffice-ui"
        - "cluster.local/ns/yas-dev/sa/yas-dev-swagger-ui"
---
# ── 3. product: BFF hai chiều + order + cart + search + sampledata
