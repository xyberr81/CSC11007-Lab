        - "cluster.local/ns/yas-dev/sa/order"
        - "cluster.local/ns/yas-dev/sa/cart"
        - "cluster.local/ns/yas-dev/sa/search"
        - "cluster.local/ns/yas-dev/sa/sampledata"
---
