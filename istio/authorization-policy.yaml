# ── 1. storefront-bff: chỉ storefront-ui và swagger-ui được gọi vào
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-storefront-bff
  namespace: yas-dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: storefront-bff
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/yas-dev/sa/storefront-ui"
        - "cluster.local/ns/yas-dev/sa/yas-dev-swagger-ui"
---
# ── 2. backoffice-bff: chỉ backoffice-ui và swagger-ui
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-backoffice-bff
  namespace: yas-dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: backoffice-bff
  action: ALLOW
